spring:
  datasource:
    url: jdbc:h2:mem:blog;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB

blog:
  admin:
    username: admin
    password: admin123
  jwt:
    secret: test-jwt-secret-key-at-least-32-bytes-long
    expire-hours: 2
  site:
    base-url: http://localhost:5173
    feed-limit: 20
  upload:
    dir: ./data/uploads-test
    max-size-bytes: 8388608
    public-path-prefix: /uploads
