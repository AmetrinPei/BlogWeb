server:
  port: 8080

spring:
  application:
    name: blog
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 8MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

blog:
  admin:
    username: admin
    password: ${ADMIN_PASSWORD:admin123}
  jwt:
    secret: ${JWT_SECRET:blog-mvp-jwt-secret-key-change-me-32bytes-min}
    access-expire-minutes: 30
    refresh-expire-days: 14
  auth:
    public-registration-enabled: ${BLOG_PUBLIC_REGISTRATION_ENABLED:true}
    login-rate-limit:
      max-failures: ${BLOG_LOGIN_MAX_FAILURES:5}
      window-seconds: ${BLOG_LOGIN_WINDOW_SECONDS:900}
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
  site:
    base-url: ${BLOG_SITE_BASE_URL:http://localhost:5173}
    feed-limit: ${BLOG_SITE_FEED_LIMIT:20}
  comment:
    rate-limit-per-minute: ${BLOG_COMMENT_RATE_LIMIT:5}
  upload:
    dir: ${BLOG_UPLOAD_DIR:./data/uploads}
    max-size-bytes: ${BLOG_UPLOAD_MAX_SIZE:8388608}
    public-path-prefix: /uploads

logging:
  level:
    root: INFO
    com.example.blog: DEBUG
