# Blog production stack (blog-ops-docker)
# Usage (from repo root):
#   1. Copy .env.example → deploy/.env (or repo-root .env) and fill secrets
#   2. Generate or place TLS certs in deploy/nginx/ssl/
#   3. docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build

name: blog

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      MYSQL_DATABASE: blog
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - blog_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      BLOG_SITE_BASE_URL: ${BLOG_SITE_BASE_URL:?set BLOG_SITE_BASE_URL}
      BLOG_UPLOAD_DIR: /data/uploads
      BLOG_PUBLIC_REGISTRATION_ENABLED: ${BLOG_PUBLIC_REGISTRATION_ENABLED:-false}
      BLOG_CORS_ALLOWED_ORIGIN_PATTERNS: ${BLOG_CORS_ALLOWED_ORIGIN_PATTERNS:-}
      # First bring-up friendly; set to validate after schema is stable
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
    volumes:
      - uploads_data:/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - blog_net

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - blog_net

volumes:
  mysql_data:
  uploads_data:

networks:
  blog_net:
    driver: bridge
